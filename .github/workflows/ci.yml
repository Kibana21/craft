name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Type-check
        run: npx tsc --noEmit
      - name: Lint
        run: npm run lint
        # `lint` may not be defined in package.json yet — non-fatal for v1
        continue-on-error: true
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: content_forge_user
          POSTGRES_PASSWORD: ci-password
          POSTGRES_DB: craft_db
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U content_forge_user"
          --health-interval 5s
          --health-retries 5
      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://content_forge_user:ci-password@localhost:5432/craft_db
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-secret
      FRONTEND_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      - name: Migrations
        run: alembic upgrade head
      - name: Import smoke
        run: python -c "from app.main import app; print('import OK')"
      - name: Pytest
        run: pytest -v --tb=short
        # Tests are still being added — non-fatal for v1
        continue-on-error: true
      - name: Lint
        run: ruff check app/
        continue-on-error: true
